<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<title>Weirdwich</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet"/>
<style>
:root{
  --bg:     #F7F2E8;
  --bg2:    #EDE6D6;
  --panel:  #FFFFFF;
  --pink:   #ff473d;
  --yellow: #FFD600;
  --green:  #00C060;
  --ink:    #1A1208;
  --ink2:   rgba(26,18,8,0.45);
  --border: rgba(26,18,8,0.1);
  --slot-h: 108px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;background:var(--bg);font-family:'Pretendard',sans-serif;color:var(--ink);overflow:hidden;}

#app{
  display:flex;flex-direction:column;
  height:100dvh;max-width:430px;margin:0 auto;
  position:relative;
}

/* ─── Stage 65% ─── */
#stage{
  flex:0 0 65%;position:relative;overflow:hidden;
  background:linear-gradient(180deg,#ff6860 0%,#f9f0e9 100%);
  border-bottom:1.5px solid var(--border);
}
#stage::before{
  content:'';position:absolute;inset:0;
  background-image:radial-gradient(circle,rgba(26,18,8,0.04) 1px,transparent 1px);
  background-size:20px 20px;pointer-events:none;
}
#layers-container{position:absolute;inset:0;pointer-events:none;}

.plate{
  position:absolute;bottom:8px;left:50%;transform:translateX(-50%);
  width:72%;height:12px;
  background:rgba(26,18,8,0.12);border-radius:50%;
  box-shadow:0 0 20px 6px rgba(26,18,8,0.06);
}

/* ─── Layer items ─── */
.layer-item{
  position:absolute;left:50%;
  transform:translateX(-50%);
  width:270px;pointer-events:none;
}
.layer-item svg{display:block;width:270px;height:auto;filter:drop-shadow(0 6px 14px rgba(26,18,8,0.28));}

/* ─── Toast ─── */
#toast{
  position:absolute;top:16px;left:50%;
  transform:translateX(-50%) translateY(-70px);
  background:var(--ink);color:#fff;
  font-size:14px;font-weight:800;
  padding:8px 20px;border-radius:100px;
  white-space:nowrap;letter-spacing:-0.01em;
  pointer-events:none;
  transition:transform 0.35s cubic-bezier(0.175,0.885,0.32,1.275),opacity 0.2s;
  opacity:0;z-index:20;
}
#toast.show{transform:translateX(-50%) translateY(0);opacity:1;}

/* ─── Bottom panel 35% ─── */
#bottom{
  flex:1;display:flex;flex-direction:column;
  background:var(--panel);
  position:relative;
}

/* ─── Slot ─── */
#slot-wrapper{
  position:relative;height:var(--slot-h);
  overflow:hidden;flex-shrink:0;
  border-bottom:1.5px solid var(--border);
  cursor:pointer;
}
#slot-track{display:flex;align-items:center;height:100%;will-change:transform;}
.slot-item{
  flex:0 0 104px;height:var(--slot-h);
  display:flex;align-items:center;justify-content:center;
}
.slot-item svg{width:82px;height:72px;filter:drop-shadow(0 2px 6px rgba(26,18,8,0.18));}

/* fade edges */
#slot-wrapper::before,#slot-wrapper::after{
  content:'';position:absolute;top:0;bottom:0;width:90px;pointer-events:none;z-index:2;
}
#slot-wrapper::before{left:0;background:linear-gradient(to right,var(--panel) 20%,transparent);}
#slot-wrapper::after{right:0;background:linear-gradient(to left,var(--panel) 20%,transparent);}

/* center highlight bar */
.slot-center{
  position:absolute;top:0;bottom:0;left:50%;
  transform:translateX(-50%);width:104px;
  border-left:2px solid var(--pink);
  border-right:2px solid var(--pink);
  pointer-events:none;z-index:1;
  opacity:0.25;
}
#slot-wrapper.stopped .slot-center{opacity:0.7;}

/* ─── Controls ─── */
#controls{
  flex:1;display:flex;
  align-items:center;justify-content:center;
  padding:0 24px;gap:14px;
}
.step-dots{display:flex;gap:5px;align-items:center;flex-shrink:0;}
.dot{width:6px;height:6px;border-radius:50%;background:rgba(26,18,8,0.12);transition:background .25s,transform .25s;}
.dot.done{background:rgba(26,18,8,0.35);}
.dot.active{background:var(--pink);transform:scale(1.5);}

#spin-btn{
  flex:1;max-width:240px;height:54px;border:none;
  background:var(--ink);color:#fff;
  font-family:'Pretendard',sans-serif;font-weight:900;font-size:18px;letter-spacing:-0.02em;
  border-radius:14px;cursor:pointer;
  box-shadow:0 4px 0 rgba(26,18,8,0.4),0 8px 20px rgba(26,18,8,0.15);
  transition:transform .1s,box-shadow .1s;
}
#spin-btn:active{transform:translateY(3px);box-shadow:0 1px 0 rgba(26,18,8,0.4);}
#spin-btn:disabled{opacity:0.5;cursor:default;transform:none;}

/* spinning state — pink */
#spin-btn.is-spinning{background:var(--pink);box-shadow:0 4px 0 #9C0040,0 8px 20px rgba(255,45,120,0.3);}

#reset-btn{
  display:none;padding:10px 14px;
  border:1.5px solid var(--border);background:transparent;
  color:var(--ink2);font-family:'Pretendard',sans-serif;
  font-size:13px;font-weight:700;border-radius:10px;cursor:pointer;
  transition:border-color .2s,color .2s;flex-shrink:0;
}
#reset-btn:hover{border-color:var(--ink);color:var(--ink);}

/* ─── Result overlay ─── */
#result-overlay{
  display:none;position:fixed;inset:0;
  background:rgba(247,242,232,0.94);
  backdrop-filter:blur(12px);
  z-index:50;align-items:center;justify-content:center;
  padding:20px;overflow-y:auto;
}
.result-card{
  background:#fff;
  border:1.5px solid var(--border);
  border-radius:28px;
  padding:36px 28px 28px;
  width:100%;max-width:360px;
  text-align:center;
  box-shadow:0 24px 60px rgba(26,18,8,0.13);
  animation:popIn .52s cubic-bezier(0.175,0.885,0.32,1.275);
}
@keyframes popIn{from{transform:scale(0.72) translateY(32px);opacity:0}to{transform:scale(1);opacity:1}}
.r-emoji{font-size:56px;margin-bottom:16px;display:block;}
.r-title{
  font-size:26px;font-weight:900;letter-spacing:-0.045em;
  margin-bottom:10px;color:var(--ink);line-height:1.15;
}
.r-story{
  font-size:13.5px;color:rgba(26,18,8,0.62);font-weight:500;
  line-height:1.7;margin-bottom:20px;
  padding:0 4px;
}
.r-divider{
  width:36px;height:2px;background:var(--border);
  margin:0 auto 18px;border-radius:2px;
}
.r-ingredients-label{
  font-size:10px;font-weight:800;letter-spacing:0.12em;
  text-transform:uppercase;color:var(--ink2);
  margin-bottom:10px;
}
.r-chips{
  display:flex;flex-wrap:wrap;gap:6px;
  justify-content:center;margin-bottom:24px;
}
.r-chip{
  background:var(--bg);border:1px solid var(--border);
  border-radius:100px;
  padding:5px 12px;
  font-size:12px;font-weight:700;color:var(--ink);
  letter-spacing:-0.01em;
}
.r-cta{
  width:100%;padding:16px;border:none;
  background:var(--ink);color:#fff;
  font-family:'Pretendard',sans-serif;font-size:15px;font-weight:900;
  border-radius:14px;cursor:pointer;letter-spacing:-0.01em;
  box-shadow:0 4px 0 rgba(26,18,8,0.38);
  transition:transform .1s,box-shadow .1s;
}
.r-cta:active{transform:translateY(3px);box-shadow:0 1px 0 rgba(26,18,8,0.38);}

/* ─── Sauce ─── */
.sauce-stream{
  position:absolute;width:5px;border-radius:3px;
  pointer-events:none;animation:sauceDrop .5s ease forwards;transform-origin:top center;
}
@keyframes sauceDrop{0%{height:0;opacity:1}80%{height:var(--h);opacity:1}100%{height:var(--h);opacity:0.55}}
@keyframes splatIn{from{transform:scale(0);opacity:0}to{transform:scale(1);opacity:0.8}}
@keyframes shake{
  0%,100%{transform:none}
  18%{transform:translateX(-5px) rotate(-1.2deg)}
  36%{transform:translateX(5px) rotate(1.2deg)}
  54%{transform:translateX(-3px)}
  72%{transform:translateX(3px)}
  90%{transform:translateX(-1px)}
}
.shaking{animation:shake .6s ease;}
</style>
</head>
<body>
<div id="app">
  <div id="stage">
    <div id="layers-container"></div>
    <div class="plate"></div>
    <div id="toast"></div>
  </div>

  <div id="bottom">
    <div id="slot-wrapper">
      <div class="slot-center"></div>
      <div id="slot-track"></div>
    </div>
    <div id="controls">
      <div class="step-dots" id="step-dots"></div>
      <button id="spin-btn">시작하기</button>
      <button id="reset-btn">↺ 다시</button>
    </div>
  </div>

  <div id="result-overlay">
    <div class="result-card">
      <span class="r-emoji" id="r-emoji"></span>
      <div class="r-title" id="r-title"></div>
      <div class="r-story" id="r-story"></div>
      <div class="r-divider"></div>
      <div class="r-ingredients-label">재료 구성</div>
      <div class="r-chips" id="r-chips"></div>
      <button class="r-cta" id="r-cta">새 샌드위치 만들기</button>
    </div>
  </div>
</div>

function buildPool(){
  // weight: normal 2x, weird 1.5x, mood 1x
  const all=[
    ...POOL_NORMAL,...POOL_NORMAL,
    ...POOL_WEIRD,...POOL_WEIRD,
    ...POOL_MOOD,
  ];
  const sh=[...all].sort(()=>Math.random()-0.5);
  return [...sh,...sh,...sh,...sh];
}

function buildSlotDOM(){
  slotTrack.innerHTML='';
  pool.forEach(item=>{
    const d=document.createElement('div');
    d.className='slot-item';
    const w=document.createElement('div');
    w.style.cssText='width:82px;height:72px;display:flex;align-items:center;justify-content:center;';
    w.innerHTML=item.svg;
    const s=w.querySelector('svg');
    if(s){s.style.width='82px';s.style.height='72px';}
    d.appendChild(w);
    slotTrack.appendChild(d);
  });
}

function halfW(){return pool.length*SW/2;}

function slotLoop(){
  if(spinning){
    slotOffset+=slotVel;
    if(slotOffset>=halfW()) slotOffset-=halfW();
    slotTrack.style.transform=`translateX(-${slotOffset}px)`;
    slotRaf=requestAnimationFrame(slotLoop);
    return;
  }
  if(decelerating){
    const diff=targetOff-slotOffset;
    const hw=halfW();
    let sd=((diff%hw)+hw)%hw;
    if(sd>hw/2) sd-=hw;
    slotOffset+=sd*0.13;
    if(slotOffset>=hw) slotOffset-=hw;
    if(slotOffset<0) slotOffset+=hw;
    slotTrack.style.transform=`translateX(-${slotOffset}px)`;
    if(Math.abs(sd)<0.7){
      slotOffset=((targetOff%hw)+hw)%hw;
      slotTrack.style.transform=`translateX(-${slotOffset}px)`;
      decelerating=false;
      onStopped();
      return;
    }
    slotRaf=requestAnimationFrame(slotLoop);
  }
}

function startSpin(){
  spinning=true; decelerating=false;
  slotVel=16;
  slotWrapper.classList.remove('stopped');
  slotRaf=requestAnimationFrame(slotLoop);
}

function doStop(){
  // pick random item, weighted
  const chosen=rnd(pool);
  // find it in pool
  const wrapW=slotWrapper.offsetWidth;
  const baseIdx=pool.findIndex(p=>p.id===chosen.id);
  const halfLen=Math.floor(pool.length/2);
  const idx2=(baseIdx+halfLen)%pool.length;
  targetOff=idx2*SW - wrapW/2 + SW/2;
  if(targetOff<0) targetOff+=halfW();
  spinning=false; decelerating=true;
  spinBtn.disabled=true;
  spinBtn.textContent='선택 중...';
  spinBtn.classList.remove('is-spinning');
}

function getItemAtCenter(){
  const wrapW=slotWrapper.offsetWidth;
  const cx=slotOffset+wrapW/2;
  const hw=halfW();
  const norm=((cx%hw)+hw)%hw;
  const idx=Math.round(norm/SW)%pool.length;
  return pool[(idx+pool.length)%pool.length];
}

async function onStopped(){
  const item=getItemAtCenter();
  slotWrapper.classList.add('stopped');
  // flash center slot
  const items=slotTrack.querySelectorAll('.slot-item');
  const wrapW=slotWrapper.offsetWidth;
  const cx=slotOffset+wrapW/2;
  const hw=halfW();
  const norm=((cx%hw)+hw)%hw;
  const ci=Math.round(norm/SW)%pool.length;
  const el=items[ci];
  if(el){el.style.transform='scale(1.18)'; setTimeout(()=>{if(el)el.style.transform='';},500);}

  // show toast — name only, no tag
  showToast(item.name);

  await sleep(300);
  // drop immediately
  await dropItem(item);
}

const sleep=ms=>new Promise(r=>setTimeout(r,ms));

function plateY(){return stage.offsetHeight-12;}

function dropItem(item){
  return new Promise(resolve=>{
    const el=document.createElement('div');
    el.className='layer-item';
    const h=item.layerH;
    const fy=plateY()-stackTopY-h;
    const rx=(Math.random()-0.5)*28;
    const rot=(Math.random()-0.5)*4;

    el.innerHTML=item.svg;
    const svgEl=el.querySelector('svg');
    if(svgEl){svgEl.style.width='270px';svgEl.style.height=h+'px';}
    el.style.cssText=`top:-${h+40}px;transform:translateX(calc(-50% + ${rx}px)) rotate(${rot}deg);width:270px;`;
    layersCont.appendChild(el);

    requestAnimationFrame(()=>{
      el.style.transition='top 0.42s cubic-bezier(0.6,0,1,0.5)';
      el.style.top=fy+'px';
      setTimeout(()=>{
        el.style.transition='top 0.1s ease-out'; el.style.top=(fy-18)+'px';
        setTimeout(()=>{
          el.style.transition='top 0.09s ease-in'; el.style.top=(fy+5)+'px';
          setTimeout(()=>{
            el.style.transition='top 0.07s ease-out'; el.style.top=fy+'px';
            stackTopY+=h*0.65;
            resolve();
          },80);
        },100);
      },430);
    });

    if(item.sauce) setTimeout(()=>spawnSauce(fy,item),440);
  });
}

function spawnSauce(fy,item){

// Override dropItem to include post-drop logic:
async function doDropAndProceed(item){
  isDropping=true;
  spinBtn.disabled=true;

  // drop animation (returns promise)
  await new Promise(resolve=>{
    const el=document.createElement('div');
    el.className='layer-item';
    const h=item.layerH;
    const fy=plateY()-stackTopY-h;
    const rx=(Math.random()-0.5)*28;
    const rot=(Math.random()-0.5)*4;
    el.innerHTML=item.svg;
    const svgEl=el.querySelector('svg');
    if(svgEl){svgEl.style.width='270px';svgEl.style.height=h+'px';}
    el.style.cssText=`top:-${h+40}px;transform:translateX(calc(-50% + ${rx}px)) rotate(${rot}deg);width:270px;`;
    layersCont.appendChild(el);
    requestAnimationFrame(()=>{
      el.style.transition='top 0.42s cubic-bezier(0.6,0,1,0.5)';
      el.style.top=fy+'px';
      setTimeout(()=>{
        el.style.transition='top 0.1s ease-out'; el.style.top=(fy-18)+'px';
        setTimeout(()=>{
          el.style.transition='top 0.09s ease-in'; el.style.top=(fy+5)+'px';
          setTimeout(()=>{
            el.style.transition='top 0.07s ease-out'; el.style.top=fy+'px';
            stackTopY+=h*0.65;
            resolve();
          },80);
        },100);
      },430);
    });
    if(item.sauce) setTimeout(()=>spawnSauce(fy,item),440);
  });

  layers.push(item);
  step++;
  renderDots();
  slotWrapper.classList.remove('stopped');

  if(step>MAX){
    // drop top bread
    spinBtn.textContent='마무리 중...';
    await new Promise(resolve=>{
      const el=document.createElement('div');
      el.className='layer-item';
      const h=TOP.layerH;
      const fy=plateY()-stackTopY-h;
      const rx=(Math.random()-0.5)*14;
      el.innerHTML=TOP.svg;
      const svgEl=el.querySelector('svg');
      if(svgEl){svgEl.style.width='270px';svgEl.style.height=h+'px';}
      el.style.cssText=`top:-${h+40}px;transform:translateX(calc(-50% + ${rx}px));width:270px;`;
      layersCont.appendChild(el);
      requestAnimationFrame(()=>{
        el.style.transition='top 0.46s cubic-bezier(0.6,0,1,0.5)';
        el.style.top=fy+'px';
        setTimeout(()=>{
          el.style.transition='top 0.11s ease-out'; el.style.top=(fy-20)+'px';
          setTimeout(()=>{
            el.style.transition='top 0.09s ease-in'; el.style.top=(fy+6)+'px';
            setTimeout(()=>{
              el.style.transition='top 0.08s ease-out'; el.style.top=fy+'px';
              stackTopY+=h*0.65;
              resolve();
            },90);
          },110);
        },470);
      });
    });
    // shake
    await sleep(120);
    stage.classList.add('shaking');
    setTimeout(()=>stage.classList.remove('shaking'),650);
    // 더 기다렸다가 결과 표시 (2초)
    await sleep(2200);
    showResult();
    isDropping=false;
  } else {
    isDropping=false;
    startSpin();
    spinBtn.disabled=false;
    spinBtn.textContent='룰렛 멈추기!';
    spinBtn.classList.add('is-spinning');
  }
}

}

      el.innerHTML=BOTTOM.svg;
      const svgEl=el.querySelector('svg');
      if(svgEl){svgEl.style.width='270px';svgEl.style.height=h+'px';}
      el.style.cssText=`top:-${h+40}px;transform:translateX(-50%);width:270px;`;
      layersCont.appendChild(el);
      requestAnimationFrame(()=>{
        el.style.transition='top 0.42s cubic-bezier(0.6,0,1,0.5)';
        el.style.top=fy+'px';
        setTimeout(()=>{
          el.style.transition='top 0.1s ease-out'; el.style.top=(fy-15)+'px';
          setTimeout(()=>{
            el.style.transition='top 0.09s ease-in'; el.style.top=(fy+4)+'px';
            setTimeout(()=>{
              el.style.transition='top 0.07s ease-out'; el.style.top=fy+'px';
              stackTopY+=h*0.65; resolve();
            },80);
          },100);
        },430);
      });
    });

    step=1; renderDots();
    isDropping=false;
    startSpin();
    spinBtn.disabled=false;
    spinBtn.textContent='룰렛 멈추기!';
    spinBtn.classList.add('is-spinning');
    return;
  }

  // Phase 1+: stop the slot
  if(spinning){
    doStop();
    return;
  }
});

// ═══════════════════════════════════════════════
//  RESULT
// ═══════════════════════════════════════════════
function showResult(){
  const names=layers.map(l=>l.name);
  const hasWeird=layers.some(l=>POOL_WEIRD.find(w=>w.id===l.id));
  const hasMood =layers.some(l=>POOL_MOOD.find(m=>m.id===l.id));

  // 심볼 이모지 (텍스트 기반)
  rEmoji.textContent=rnd(EMOJ);

  // 네이밍: 형용사 + 명사 조합 (재료 수 힌트 포함)
  rTitle.textContent=rnd(ADJ)+' '+rnd(NOUN);

  // 스토리
  const tmpl=rnd(STORY_TEMPLATES);
  rStory.textContent=tmpl(names,hasWeird,hasMood);

  // 재료 칩
  rChips.innerHTML=layers.map(l=>`<span class="r-chip">${l.name}</span>`).join('');

  resultOv.style.display='flex';
  resetBtn.style.display='block';
  spinBtn.style.display='none';
}

rCta.addEventListener('click',reset);
resetBtn.addEventListener('click',reset);
function reset(){
  resultOv.style.display='none';
  spinBtn.style.display='';
  resetBtn.style.display='none';
  layersCont.innerHTML='';
  stackTopY=0; layers=[]; step=0; isDropping=false;
  spinning=false; decelerating=false;
  cancelAnimationFrame(slotRaf);
  spinBtn.disabled=false;
  spinBtn.textContent='시작하기';
  spinBtn.classList.remove('is-spinning');
  renderDots();
  pool=buildPool(); slotOffset=0;
  buildSlotDOM();
  slotTrack.style.transform='translateX(0)';
  slotWrapper.classList.remove('stopped');
}

// ═══════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════
pool=buildPool();
buildSlotDOM();
renderDots();
</script>
